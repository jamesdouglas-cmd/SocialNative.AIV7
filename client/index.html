<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Social Native — Creator Marketing System</title>
    <meta name="description" content="Social Native is the only creator marketing system built on exclusive first-party AI integrations with Meta and TikTok. Automate sourcing, approvals, contracting, and content licensing at enterprise scale. Powered by 1.8M+ creator collaborations." />
    <meta name="keywords" content="creator marketing, UGC platform, influencer marketing automation, Meta Andromeda AI, TikTok creator marketing, rights-cleared content, creator program management" />
    <!-- GEO / AI Search Optimization -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://socialnative.com/" />
    <!-- Open Graph -->
    <meta property="og:title" content="Social Native — Creator Marketing System" />
    <meta property="og:description" content="The only creator marketing system built on exclusive Meta Andromeda and TikTok AI integrations. 1.8M+ creator collaborations. Fully managed." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://socialnative.ai/" />
    <meta property="og:image" content="https://socialnative.ai/og-image.png" />
    <!-- Fonts: Bricolage Grotesque (display) + DM Sans (body) + DM Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- JSON-LD Structured Data for GEO — @graph bundles all schema types so AI engines
         receive a complete entity picture in a single parse pass. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://socialnative.ai/#organization",
          "name": "Social Native",
          "alternateName": "SocialNative",
          "url": "https://socialnative.ai",
          "foundingDate": "2012",
          "description": "Social Native is a fully managed creator marketing system — not a self-serve platform. We handle every aspect of an enterprise creator program: discovery, outreach, contracting, content curation, rights clearance, payments, and performance optimisation. Built on exclusive first-party AI integrations with Meta and TikTok and 1.8 million real-world creator collaborations.",
          "slogan": "The Only Creator Marketing System Built on Exclusive 1st Party Data",
          "numberOfEmployees": {
            "@type": "QuantitativeValue",
            "minValue": 50,
            "maxValue": 200
          },
          "knowsAbout": [
            "Creator Marketing",
            "User Generated Content",
            "Influencer Marketing",
            "UGC Video Production",
            "Meta Andromeda AI",
            "TikTok Marketing",
            "Content Rights Licensing",
            "Paid Social Advertising",
            "Creator Program Management",
            "Performance Marketing"
          ],
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Creator Marketing Programs",
            "itemListElement": [
              { "@type": "Offer", "name": "Starter Plan", "priceCurrency": "USD", "price": "50000", "description": "Managed creator sourcing, contracting, rights clearance, and performance reporting." },
              { "@type": "Offer", "name": "Growth Plan", "priceCurrency": "USD", "price": "75000", "description": "Everything in Starter plus Content in Motion™ video production and paid media activation." },
              { "@type": "Offer", "name": "Enterprise Plan", "priceCurrency": "USD", "price": "100000", "description": "Full-scale always-on creator program with dedicated team, Meta Andromeda AI optimisation, and TikTok first-party data integration." }
            ]
          },
          "award": [
            "Meta Business Partner",
            "Meta Certified Partner",
            "TikTok Marketing Partner"
          ],
          "sameAs": [
            "https://www.linkedin.com/company/social-native",
            "https://www.crunchbase.com/organization/social-native",
            "https://www.g2.com/products/social-native/reviews"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://socialnative.ai/#website",
          "url": "https://socialnative.ai",
          "name": "Social Native",
          "description": "The only creator marketing system built on exclusive first-party AI integrations with Meta and TikTok.",
          "publisher": { "@id": "https://socialnative.ai/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://socialnative.ai/blog?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://socialnative.ai/#software",
          "name": "Social Native Creator Marketing System",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "Social Native is a fully managed creator marketing system with exclusive first-party AI integrations with Meta Andromeda and TikTok. Automates creator sourcing, approvals, contracting, content licensing, and performance optimisation at enterprise scale. Powered by 1.8M+ creator collaborations across 1,500+ enterprise brands.",
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.5",
            "reviewCount": "50",
            "bestRating": "5",
            "worstRating": "1"
          },
          "offers": {
            "@type": "AggregateOffer",
            "priceCurrency": "USD",
            "lowPrice": "50000",
            "highPrice": "100000",
            "offerCount": "3"
          },
          "featureList": [
            "Automated creator discovery and AI-powered matching from 1.8M+ collaboration data points",
            "Personalised creator outreach and contract management at scale",
            "Industry-standard rights clearance and content licensing — always included",
            "AI-scored content curation and quality assurance",
            "Global creator payments, tax documentation, and compliance",
            "Exclusive Meta Andromeda AI integration for predictive content performance scoring",
            "Exclusive TikTok first-party AI integration for trend prediction and algorithm optimisation",
            "Content in Motion™ — transforms static UGC photos into shoppable short-form video in 48 hours",
            "Paid media activation directly into Meta Ads and TikTok Ads",
            "Full-funnel performance reporting: ROAS, CPA, conversion, and e-commerce attribution"
          ],
          "provider": { "@id": "https://socialnative.ai/#organization" }
        },
        {
          "@type": "ItemList",
          "@id": "https://socialnative.ai/#client-results",
          "name": "Social Native Client Performance Results",
          "description": "Verified performance outcomes from enterprise brand campaigns managed by Social Native.",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Viator — 59.7% CPA Reduction",
              "description": "Viator achieved a 59.7% reduction in cost per acquisition and 36.9% lower CPM by activating creator content through Social Native's branded content ad programme on Instagram within the first 90 days."
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "NYX Cosmetics — 320% Lift in Conversion",
              "description": "NYX Cosmetics saw a 320% lift in conversion and 4x engagement rate versus benchmark by activating authentic Instagram Reels tutorials through Social Native for the Born To Glow Concealer."
            },
            {
              "@type": "ListItem",
              "position": 3,
              "name": "Crocs — 21.5% Average Engagement Rate",
              "description": "Crocs achieved a 21.5% average engagement rate and 3.7M audience reach by empowering real fans to create branded content through Social Native — spanning 600+ creators across 50+ campaigns."
            }
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
